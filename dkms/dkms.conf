PACKAGE_NAME="wm8960-audio-hat"
PACKAGE_VERSION="1.0"
BUILT_MODULE_NAME[0]="snd-soc-wm8960"
BUILT_MODULE_LOCATION[0]="."
DEST_MODULE_LOCATION[0]="/updates/dkms"
AUTOINSTALL="yes"

# KBUILD_MODPOST_WARN=1 needed for Orange Pi OS (CONFIG_MODVERSIONS disabled, empty Module.symvers)
MAKE="make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build KBUILD_MODPOST_WARN=1 modules"
CLEAN="make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build clean"
