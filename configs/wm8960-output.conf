; WM8960 Audio HAT — PulseAudio output path
;
; Maps the WM8960's actual ALSA mixer elements to PulseAudio volume
; controls. Uses volume=merge so PA reads the current hardware value
; (set by wm8960-audio.service) without resetting it.
;
; Routing switches are set to ignore so PA doesn't touch the signal
; path configured by our service. Elements not listed here (ALC, 3D,
; noise gate, etc.) are automatically ignored by PA.
;
; Installed to: /usr/share/pulseaudio/alsa-mixer/paths/wm8960-output.conf

[General]
priority = 100

; Headphone amplifier — the WM8960's speaker amp is fed from the
; headphone amp output, so this controls volume for BOTH outputs.
[Element Headphone]
volume = merge
override-map.1 = all
override-map.2 = all-left,all-right

; Speaker amplifier volume
[Element Speaker]
volume = merge
override-map.1 = all
override-map.2 = all-left,all-right

; DAC digital volume (0-255)
[Element Playback]
volume = merge
override-map.1 = all
override-map.2 = all-left,all-right

; Output mixer routing — leave alone (configured by our service)
[Element Left Output Mixer PCM]
switch = ignore
volume = ignore

[Element Right Output Mixer PCM]
switch = ignore
volume = ignore
