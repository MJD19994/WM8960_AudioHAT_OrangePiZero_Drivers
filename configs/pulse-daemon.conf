# WM8960 Audio HAT — PulseAudio daemon configuration
#
# Locks PulseAudio to 48kHz to match the WM8960 hardware clock.
# Setting both default and alternate to 48000 prevents PA from
# switching rates based on application requests. PA's built-in
# resampler handles all other rates transparently.
#
# Installed to: /etc/pulse/daemon.conf.d/10-wm8960.conf

default-sample-rate = 48000
alternate-sample-rate = 48000
flat-volumes = no
