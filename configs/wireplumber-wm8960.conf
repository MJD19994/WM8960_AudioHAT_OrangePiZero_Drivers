# WM8960 Audio HAT — WirePlumber device priority rules
#
# Makes the WM8960 the default output and input device by setting
# its priority above HDMI, built-in codec, and USB audio defaults.
# Uses WirePlumber 0.5+ SPA-JSON format (not the deprecated Lua format).
#
# The ~ prefix enables glob matching on node.name.
# Default sink priorities are 600-1000; source priorities 1600-2000.
# We set slightly above to win without breaking the priority model.
#
# PipeWire names the AHUB+WM8960 machine driver node as:
#   alsa_output.platform-soc_ahub0_mach.stereo-fallback
#   alsa_input.platform-soc_ahub0_mach.stereo-fallback
#
# Installed to: /etc/wireplumber/wireplumber.conf.d/51-wm8960.conf

monitor.alsa.rules = [
  {
    matches = [
      {
        node.name = "~alsa_output.*ahub0*"
      }
    ]
    actions = {
      update-props = {
        priority.driver    = 1010
        priority.session   = 1010
        node.description   = "WM8960 Audio HAT"
      }
    }
  },
  {
    matches = [
      {
        node.name = "~alsa_input.*ahub0*"
      }
    ]
    actions = {
      update-props = {
        priority.driver    = 2010
        priority.session   = 2010
        node.description   = "WM8960 Audio HAT"
      }
    }
  }
]
