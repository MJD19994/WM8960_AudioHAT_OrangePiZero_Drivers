; WM8960 Audio HAT — PulseAudio input path
;
; Maps the WM8960's capture ALSA mixer elements to PulseAudio volume
; controls. Uses volume=merge so PA reads the current hardware value
; (set by wm8960-audio.service) without resetting it.
;
; Input routing switches are set to ignore so PA doesn't touch the
; signal path configured by our service.
;
; Installed to: /usr/share/pulseaudio/alsa-mixer/paths/wm8960-input.conf

[General]
priority = 100

; Capture volume and switch (ADC PGA gain, 0-63)
[Element Capture]
switch = mute
volume = merge
override-map.1 = all
override-map.2 = all-left,all-right

; Input boost mixer routing — leave alone
[Element Left Input Mixer Boost]
switch = ignore
volume = ignore

[Element Right Input Mixer Boost]
switch = ignore
volume = ignore
