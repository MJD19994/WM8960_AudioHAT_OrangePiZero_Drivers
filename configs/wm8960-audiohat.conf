; WM8960 Audio HAT — PulseAudio profile set
;
; Custom profile set for the WM8960 codec. Assigns our path files so
; PulseAudio maps the WM8960's actual mixer elements instead of using
; the default paths (which don't match and cause mixer resets).
;
; With volume=merge in the path files, PA reads the current mixer
; values (set by wm8960-audio.service) and provides hardware volume
; control through the PA GUI without resetting anything.
;
; Assigned to the WM8960 card via udev rule (91-wm8960-pulseaudio.rules).
; Installed to: /usr/share/pulseaudio/alsa-mixer/profile-sets/wm8960-audiohat.conf

[General]
auto-profiles = no

[Mapping analog-stereo-output]
device-strings = hw:%f
channel-map = left,right
paths-output = wm8960-output
direction = output
priority = 10

[Mapping analog-stereo-input]
device-strings = hw:%f
channel-map = left,right
paths-input = wm8960-input
direction = input
priority = 10

[Profile output:analog-stereo-output+input:analog-stereo-input]
output-mappings = analog-stereo-output
input-mappings = analog-stereo-input
priority = 100

[Profile output:analog-stereo-output]
output-mappings = analog-stereo-output
priority = 50

[Profile input:analog-stereo-input]
input-mappings = analog-stereo-input
priority = 50
