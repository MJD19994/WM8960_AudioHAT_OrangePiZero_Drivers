# WM8960 Audio HAT — PipeWire clock rate configuration
#
# The WM8960 hardware PLL is locked at 48kHz. Restricting PipeWire's
# allowed rates prevents it from trying to reopen the device at other
# rates. PipeWire's built-in resampler handles all other rates
# transparently (e.g., 16kHz voice assistant audio).
#
# Installed to: /etc/pipewire/pipewire.conf.d/10-wm8960-rate.conf

context.properties = {
    default.clock.rate          = 48000
    default.clock.allowed-rates = [ 48000 ]
}
